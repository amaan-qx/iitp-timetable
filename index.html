<!DOCTYPE html>
<html>
<head>
  <title>Timetable Viewer</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <section class="card">
      <h1 class="title">Timetable Viewer</h1>
      <p class="subtitle">Enter your roll number to see all matching timetable entries.</p>

      <div class="searchRow">
        <label class="label" for="rollInput">Roll number</label>
        <div class="inputRow">
          <input
            type="text"
            id="rollInput"
            placeholder="e.g., 2301AI01"
            autocomplete="off"
            spellcheck="false"
          />
          <button id="searchBtn" type="button">Search</button>
        </div>
        <div id="status" class="status" aria-live="polite"></div>
      </div>

      <div id="result" class="result"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
